<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>admin-dashboard</title>
</head>

<body>
    <header>
        <div class="header-top">
            <div class="top-left">
                <img class="magnify icon" src="/assets/icons/magnify.svg" alt="magnify icon">
                <div class="search-bar"></div>
            </div>
            <div class="top-right">
                <img class="bell-ring icon" src="/assets/icons/bell-ring-outline.svg" alt="bell-ring icon">
                <img class="user0 avatar icon" src="/assets/avatars/avatar0.svg" alt="user avatar icon">
                <h2 class="username">Peter Corneles</h2>
            </div>
        </div>
        <div class="header-bottom">
            <div class="bottom-left">
                <img class="user0 avatar" src="/assets/avatars/avatar0.svg" alt="user avatar">
                <div class="header-text">
                    <h4>Hi there,</h4>
                    <h1>Peter Corneles (@peter)</h1>
                </div>
            </div>
            <div class="bottom-right">
                <button>New</button>
                <button>Upload</button>
                <button>Share</button>
            </div>
        </div>
    </header>
    <aside>
        <div class="sidebar-logo-container">
            <div class="logo"><img class="icon" src="/assets/icons/land-plots-circle-variant.svg" alt="logo icon">
                <h1>Dashboard</h1>
            </div>
        </div>
        <div class="sidebar-link-container">
            <div class="link"><img class="icon" src="/assets/icons/home.svg" alt="home icon">
                <h2>Home</h2>
            </div>
            <div class="link"><img class="icon" src="/assets/icons/card-account-details-outline.svg"
                    alt="card-details icon">
                <h2>Profile</h2>
            </div>
            <div class="link"><img class="icon" src="/assets/icons/message.svg" alt="message icon">
                <h2>Messages</h2>
            </div>
            <div class="link"><img class="icon" src="/assets/icons/clock-time-four.svg" alt="clock-time-four icon">
                <h2>History</h2>
            </div>
            <div class="link"><img class="icon" src="/assets/icons/note-multiple.svg" alt="note-multiple icon">
                <h2>Tasks</h2>
            </div>
            <div class="link"><img class="icon" src="/assets/icons/account-group.svg" alt="account-group icon">
                <h2>Communities</h2>
            </div>
        </div>
        <div class="sidebar-link-container">
            <div class="link"><img class="icon" src="/assets/icons/cog.svg" alt="cog icon">
                <h2>Settings</h2>
            </div>
            <div class="link"><img class="icon" src="/assets/icons/help-box.svg" alt="help-box icon">
                <h2>Support</h2>
            </div>
            <div class="link"><img class="icon" src="/assets/icons/shield-check.svg" alt="shield-check icon">
                <h2>Privacy</h2>
            </div>
        </div>
    </aside>
    <main>
        <div class="projects">
            <h1 class="title">Projects</h1>
            <div class="projects-container">
                <div class="project">Project 1</div>
                <div class="project">Project 1</div>
                <div class="project">Project 1</div>
                <div class="project">Project 1</div>
                <div class="project">Project 1</div>
                <div class="project">Project 1</div>
            </div>
        </div>
        <div class="announcements"></div>
        <div class="trending"></div>
    </main>
</body>

</html>
