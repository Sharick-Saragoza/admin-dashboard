<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>admin-dashboard</title>
</head>

<body>
    <header>
        <div class="header-top">
            <div class="top-left">
                <img class="magnify icon" src="/assets/icons/magnify.svg" alt="magnify icon">
                <div class="search-bar"></div>
            </div>
            <div class="top-right">
                <img class="bell-ring icon" src="/assets/icons/bell-ring-outline.svg" alt="bell-ring icon">
                <img class="user0 avatar icon" src="/assets/avatars/avatar0.svg" alt="user avatar icon">
                <h2 class="username">Peter Corneles</h2>
            </div>
        </div>
        <div class="header-bottom">
            <div class="bottom-left">
                <img class="user0 avatar" src="/assets/avatars/avatar0.svg" alt="user avatar">
                <div class="header-text">
                    <h4>Hi there,</h4>
                    <h1>Peter Corneles (@peter)</h1>
                </div>
            </div>
            <div class="bottom-right">
                <button>New</button>
                <button>Upload</button>
                <button>Share</button>
            </div>
        </div>
    </header>
    <aside>
    </aside>
    <main></main>
</body>

</html>
